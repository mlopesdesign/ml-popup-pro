name: Build and Release ML Popup Pro

on:
  push:
      tags:
            - 'v*.*.*'

            permissions:
              contents: write

              jobs:
                release:
                    runs-on: ubuntu-latest
                        steps:
                              - uses: actions/checkout@v4
                                    - uses: shivammathur/setup-php@v2
                                            with:
                                                      php-version: '8.1'
                                                            - name: Build ZIP
                                                                    run: |
                                                                              TAG=${GITHUB_REF#refs/tags/v}
                                                                                        ZIP=ml-popup-pro-v${TAG}.zip
                                                                                                  mkdir -p /tmp/z/ml-popup-pro
                                                                                                            rsync -a --exclude='.git' --exclude='.github' --exclude='*.zip' . /tmp/z/ml-popup-pro/
                                                                                                                      cd /tmp/z && zip -r $GITHUB_WORKSPACE/$ZIP ml-popup-pro/
                                                                                                                                echo "ZIP=$ZIP" >> $GITHUB_OUTPUT
                                                                                                                                          echo "TAG=v${TAG}" >> $GITHUB_OUTPUT
                                                                                                                                                - name: Release
                                                                                                                                                        uses: softprops/action-gh-release@v2
                                                                                                                                                                with:
                                                                                                                                                                          files: ml-popup-pro-v*.zip
                                                                                                                                                                                  env:
                                                                                                                                                                                            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
