name: Build and Release ML Popup Pro

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'ml-popup-pro/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/**'
      - 'composer.json'
      - 'phpunit.xml.dist'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag para empacotar (ex.: v1.4.1). Vazio = usa a tag/HEAD do push.'
        required: false
        default: ''

permissions:
  contents: write

# Cancel previous runs of this workflow on the same ref.
concurrency:
  group: mlpp-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint + Test gates (PR + tag) ─────────────────────────────
  lint:
    name: Lint (PHP + JS + sync-version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync-version check
        run: bash scripts/sync-version.sh

      - name: Header <-> package version check
        if: github.event_name == 'pull_request'
        run: |
          bare="${{ github.event.pull_request.head.ref }}"
          bare="${bare##*/}"
          if [ -z "$bare" ]; then exit 0; fi
          header=$(grep -E '^\s*\*\s*Version:' ml-popup-pro/ml-popup-pro.php | head -1 | sed -E 's/.*Version:\s*([0-9.]+).*/\1/')
          [ -z "$header" ] && exit 0
          echo "Branch version not enforced in PR — header is $header."

      - name: PHP syntax
        run: find ml-popup-pro -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: JS syntax
        run: |
          for f in $(find ml-popup-pro -name "*.js"); do
            node --check "$f"
          done

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ml-popup-pro/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('ml-popup-pro/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ml-popup-pro
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        working-directory: ml-popup-pro
        run: vendor/bin/phpunit --colors=never

  build-and-release:
    name: Build ZIP and publish GitHub Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determinar versao alvo
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            target="${{ inputs.tag }}"
          else
            target="${GITHUB_REF_NAME}"
          fi
          bare="${target#v}"
          echo "target=$target" >> $GITHUB_OUTPUT
          echo "bare=$bare" >> $GITHUB_OUTPUT

      - name: Validar sincronizacao de versao
        run: bash scripts/sync-version.sh

      - name: Validar que tag == versao do header
        run: |
          bare="${{ steps.version.outputs.bare }}"
          header=$(grep -E '^\s*\*\s*Version:' ml-popup-pro/ml-popup-pro.php | head -1 | sed -E 's/.*Version:\s*([0-9.]+).*/\1/')
          if [ "$header" != "$bare" ]; then
            echo "Tag $bare difere do Version: $header"
            exit 1
          fi

      - name: Sintaxe PHP
        run: find ml-popup-pro -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Sintaxe JS
        run: |
          for f in $(find ml-popup-pro -name "*.js"); do
            node --check "$f"
          done

      - name: Empacotar ZIP
        run: bash scripts/package.sh "${{ steps.version.outputs.bare }}"

      - name: Capturar SHA-256 e tamanho
        id: hash
        working-directory: dist
        run: |
          f=$(ls *.zip)
          echo "name=$f"            >> $GITHUB_OUTPUT
          echo "size=$(stat -c%s "$f")" >> $GITHUB_OUTPUT
          echo "sha256=$(sha256sum "$f" | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ML Popup Pro ${{ steps.version.outputs.target }}
          body: |
            ## ML Popup Pro ${{ steps.version.outputs.target }}

            Release publicada via GitHub Actions.

            ### Arquivo
            ZIP: `${{ steps.hash.outputs.name }}`

            ### SHA-256
            `${{ steps.hash.outputs.sha256 }}`

            ### Tamanho
            ${{ steps.hash.outputs.size }} bytes

            ### Atualizacao automatica
            O plugin detecta esta release via GitHub Releases API
            (`api.github.com/repos/mlopesdesign/ml-popup-pro/releases/latest`)
            e aparece em `WP Admin > Plugins > Atualizacoes`.
          files: dist/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}